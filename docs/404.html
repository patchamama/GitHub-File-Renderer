<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GitHub File Renderer</title>
  <script>
    // GitHub Pages SPA redirect — works regardless of repo name or custom domain
    var query = window.location.search;
    var hash = window.location.hash;
    window.location.replace(window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/') + query + hash);
  </script>
</head>
<body></body>
</html>
