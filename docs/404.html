<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GitHub File Renderer</title>
  <script>
    // GitHub Pages SPA redirect
    var seg = window.location.pathname.replace('/GitHub-File-Renderer', '');
    var query = window.location.search.slice(1);
    var hash = window.location.hash.slice(1);
    window.location.replace(
      window.location.origin + '/GitHub-File-Renderer/' +
      (query ? '?' + query : '') +
      (hash ? '#' + hash : '')
    );
  </script>
</head>
<body></body>
</html>
